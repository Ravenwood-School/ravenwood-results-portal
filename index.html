<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ravenwood Result Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCf7oLsMasSxi496kcdxn6zVjUkpFqAU0E",
            authDomain: "ravenwood-results-portal.firebaseapp.com",
            projectId: "ravenwood-results-portal",
            storageBucket: "ravenwood-results-portal.firebasestorage.app",
            messagingSenderId: "721983729926",
            appId: "1:721983729926:web:758c092fdcf8f834c92e87"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.doc = doc;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        
        // Initialize App on Load
        window.onload = initApp;
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center relative z-20">
        <div class="flex items-center space-x-3">
            <div class="h-10 w-10 rounded-full bg-white flex items-center justify-center text-blue-900 font-bold text-xs">LOGO</div>
            <h1 class="text-xl font-bold tracking-wide">NWW RAVENWOOD INTERNATIONAL SCHOOL</h1>
        </div>
        <button onclick="adminLogin()" class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded font-semibold transition shadow">⚙️ Admin Panel</button>
    </nav>

    <div class="max-w-7xl mx-auto mt-6 p-6 bg-white shadow-xl rounded-lg border border-gray-200 relative">
        
        <div id="loading-screen" class="text-center py-20 text-blue-900 font-bold text-xl">
            Connecting to Database...
        </div>

        <div id="teacher-login-section" class="hidden text-center py-10">
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Teacher Portal</h2>
            <div class="flex flex-col md:flex-row justify-center gap-4 mb-8">
                <select id="academic-year" class="p-3 border rounded shadow-sm bg-gray-50">
                    <option value="2026-27">2026-27</option>
                    <option value="2025-26">2025-26 (Historical)</option>
                </select>
                <select id="exam-term" class="p-3 border rounded shadow-sm bg-gray-50">
                    <option value="PT1">PT 1 Exam (40 Marks)</option>
                    <option value="HalfYearly">Half Yearly Exam (80 Marks)</option>
                    <option value="PT2">PT 2 Exam (40 Marks)</option>
                    <option value="Final">Final Year Exam (100 Marks)</option>
                </select>
                <select id="class-select" class="p-3 border rounded shadow-sm w-64 bg-gray-50">
                    <option value="">-- Select Class --</option>
                    </select>
            </div>
            <button onclick="loadClassData()" class="bg-green-600 hover:bg-green-500 text-white px-8 py-3 rounded font-bold text-lg shadow transition transform hover:scale-105">Enter Class</button>
        </div>

        <div id="teacher-dashboard" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 id="dashboard-title" class="text-2xl font-bold text-blue-900"></h2>
                <div class="space-x-3">
                    <span id="save-status" class="text-sm font-semibold text-gray-500 mr-2">All changes saved</span>
                    <button onclick="saveToFirebase()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-semibold shadow transition">💾 Save to Cloud</button>
                    <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded font-semibold shadow transition">⬇️ Download Excel</button>
                    <button onclick="location.reload()" class="bg-gray-500 hover:bg-gray-400 text-white px-4 py-2 rounded font-semibold shadow transition">Logout</button>
                </div>
            </div>

            <div class="overflow-x-auto border rounded shadow-sm mb-4">
                <table class="w-full text-sm text-left whitespace-nowrap">
                    <thead class="text-xs text-white uppercase bg-blue-900" id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <button onclick="addStudentRow()" class="bg-blue-50 text-blue-700 border border-blue-300 px-4 py-2 rounded font-semibold hover:bg-blue-100 transition shadow-sm">+ Add Student Row</button>
        </div>

        <div id="admin-dashboard" class="hidden absolute top-0 left-0 w-full h-full bg-white z-10 p-8 rounded-lg">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-3xl font-bold text-blue-900">⚙️ Master Admin Panel</h2>
                <div class="space-x-4">
                    <button onclick="saveAdminConfig()" class="bg-green-600 hover:bg-green-500 text-white px-6 py-2 rounded font-bold shadow transition">💾 Save All Settings</button>
                    <button onclick="closeAdmin()" class="bg-red-500 hover:bg-red-400 text-white px-4 py-2 rounded font-bold shadow transition">Exit Admin</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-gray-50 p-6 rounded-lg border shadow-sm">
                    <h3 class="text-xl font-bold mb-4 text-gray-800">Manage Classes</h3>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="new-class-input" placeholder="e.g. VI-Newton" class="border p-2 w-full rounded focus:ring-2 focus:ring-blue-400 outline-none">
                        <button onclick="addClass()" class="bg-blue-600 text-white px-4 rounded font-bold hover:bg-blue-500">Add</button>
                    </div>
                    <ul id="admin-class-list" class="space-y-2 max-h-64 overflow-y-auto"></ul>
                </div>

                <div class="bg-gray-50 p-6 rounded-lg border shadow-sm">
                    <h3 class="text-xl font-bold mb-4 text-gray-800">Manage Subjects</h3>
                    
                    <div class="mb-4">
                        <h4 class="font-bold text-gray-600 mb-2">Numeric Subjects (Maths, EVS, etc.)</h4>
                        <div class="flex gap-2 mb-2">
                            <input type="text" id="new-num-sub" placeholder="e.g. Science" class="border p-2 w-full rounded focus:ring-2 focus:ring-blue-400 outline-none">
                            <button onclick="addSubject('numeric')" class="bg-blue-600 text-white px-4 rounded font-bold hover:bg-blue-500">Add</button>
                        </div>
                        <div id="admin-num-sub-list" class="flex flex-wrap gap-2 mb-4"></div>
                    </div>

                    <div class="border-t pt-4">
                        <h4 class="font-bold text-gray-600 mb-2">Grading Subjects (Art, Music, etc.)</h4>
                        <div class="flex gap-2 mb-2">
                            <input type="text" id="new-grad-sub" placeholder="e.g. Yoga" class="border p-2 w-full rounded focus:ring-2 focus:ring-purple-400 outline-none">
                            <button onclick="addSubject('grading')" class="bg-purple-600 text-white px-4 rounded font-bold hover:bg-purple-500">Add</button>
                        </div>
                        <div id="admin-grad-sub-list" class="flex flex-wrap gap-2"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- DYNAMIC SYSTEM CONFIGURATION ---
        const TERM_MAX_MARKS = { "PT1": 40, "HalfYearly": 80, "PT2": 40, "Final": 100 };
        
        // These will now be loaded from Firebase!
        let sysConfig = {
            classes: ["I-Daffodils", "V-MtBlanc"],
            numericSubjects: ["English", "Hindi", "Punjabi", "Maths", "EVS", "ICT"],
            gradingSubjects: ["Art", "Dance", "Music", "P.Edu"]
        };
        
        let currentState = { year: "", term: "", cls: "", students: [] };

        // --- SYSTEM INITIALIZATION ---
        async function initApp() {
            try {
                const docRef = window.doc(window.db, "settings", "global_config");
                const docSnap = await window.getDoc(docRef);
                
                if (docSnap.exists()) {
                    sysConfig = docSnap.data();
                } else {
                    // Seed the database with defaults on first run
                    await window.setDoc(docRef, sysConfig);
                }
                
                // Populate Teacher Dropdowns
                const classSelect = document.getElementById('class-select');
                classSelect.innerHTML = '<option value="">-- Select Class --</option>';
                sysConfig.classes.forEach(c => {
                    classSelect.innerHTML += `<option value="${c}">${c.replace('-', ' ')}</option>`;
                });

                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('teacher-login-section').classList.remove('hidden');
            } catch (error) {
                alert("Database Connection Error: " + error.message);
            }
        }

        // --- ADMIN PANEL LOGIC ---
        function adminLogin() {
            const pwd = prompt("Enter Master Admin Password:");
            if(pwd === "Admin@Ravenwood2025") {
                document.getElementById('teacher-login-section').classList.add('hidden');
                document.getElementById('teacher-dashboard').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                renderAdminUI();
            } else if (pwd) {
                alert("Incorrect Password.");
            }
        }

        function closeAdmin() {
            location.reload(); // Refresh to apply changes to teacher portal
        }

        function renderAdminUI() {
            // Render Classes
            let classHTML = '';
            sysConfig.classes.forEach((c, index) => {
                classHTML += `<li class="flex justify-between items-center bg-white p-2 border rounded">
                    <span class="font-bold">${c}</span>
                    <button onclick="deleteItem('classes', ${index})" class="text-red-500 hover:text-red-700 font-bold px-2">X</button>
                </li>`;
            });
            document.getElementById('admin-class-list').innerHTML = classHTML;

            // Render Numeric Subjects
            let numHTML = '';
            sysConfig.numericSubjects.forEach((sub, index) => {
                numHTML += `<span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm flex items-center gap-2">
                    ${sub} <button onclick="deleteItem('numericSubjects', ${index})" class="text-blue-500 hover:text-blue-900 font-bold">x</button>
                </span>`;
            });
            document.getElementById('admin-num-sub-list').innerHTML = numHTML;

            // Render Grading Subjects
            let gradHTML = '';
            sysConfig.gradingSubjects.forEach((sub, index) => {
                gradHTML += `<span class="bg-purple-100 text-purple-800 px-3 py-1 rounded-full text-sm flex items-center gap-2">
                    ${sub} <button onclick="deleteItem('gradingSubjects', ${index})" class="text-purple-500 hover:text-purple-900 font-bold">x</button>
                </span>`;
            });
            document.getElementById('admin-grad-sub-list').innerHTML = gradHTML;
        }

        function addClass() {
            let val = document.getElementById('new-class-input').value.trim();
            if(val && !sysConfig.classes.includes(val)) {
                sysConfig.classes.push(val);
                document.getElementById('new-class-input').value = '';
                renderAdminUI();
            }
        }

        function addSubject(type) {
            let inputId = type === 'numeric' ? 'new-num-sub' : 'new-grad-sub';
            let arrayName = type === 'numeric' ? 'numericSubjects' : 'gradingSubjects';
            let val = document.getElementById(inputId).value.trim();
            
            if(val && !sysConfig[arrayName].includes(val)) {
                sysConfig[arrayName].push(val);
                document.getElementById(inputId).value = '';
                renderAdminUI();
            }
        }

        function deleteItem(arrayName, index) {
            sysConfig[arrayName].splice(index, 1);
            renderAdminUI();
        }

        async function saveAdminConfig() {
            try {
                await window.setDoc(window.doc(window.db, "settings", "global_config"), sysConfig);
                alert("Settings Saved Successfully! All teacher portals are updated.");
            } catch (error) {
                alert("Error saving settings: " + error.message);
            }
        }

        // --- CORE MATH ENGINE ---
        function calculateGradesAndRanks() {
            let maxPerSubject = TERM_MAX_MARKS[currentState.term] || 100;
            let totalMax = maxPerSubject * sysConfig.numericSubjects.length;

            currentState.students.forEach(s => {
                let total = 0;
                let subjectsFilled = 0;
                
                sysConfig.numericSubjects.forEach(sub => {
                    let mark = parseFloat(s.marks[sub]);
                    if (!isNaN(mark)) { total += mark; subjectsFilled++; }
                });

                if (subjectsFilled === sysConfig.numericSubjects.length && sysConfig.numericSubjects.length > 0) {
                    s.total = total;
                    s.percentage = parseFloat(((total / totalMax) * 100).toFixed(2));
                    
                    let p = s.percentage;
                    if(p >= 91) s.grade = "A1"; else if(p >= 81) s.grade = "A2";
                    else if(p >= 71) s.grade = "B1"; else if(p >= 61) s.grade = "B2";
                    else if(p >= 51) s.grade = "C1"; else if(p >= 41) s.grade = "C2";
                    else if(p >= 33) s.grade = "D"; else s.grade = "E";
                } else {
                    s.total = "Inc"; s.percentage = "Inc"; s.grade = ""; s.rank = "";
                }
            });

            let validStudents = currentState.students.filter(s => s.percentage !== "Inc");
            let uniqueScores = [...new Set(validStudents.map(s => s.percentage))].sort((a, b) => b - a);

            currentState.students.forEach(s => {
                if (s.percentage !== "Inc") {
                    let rankNum = uniqueScores.indexOf(s.percentage) + 1;
                    if(rankNum === 1) s.rank = "1st";
                    else if(rankNum === 2) s.rank = "2nd";
                    else if(rankNum === 3) s.rank = "3rd";
                    else if(rankNum === 4) s.rank = "4th";
                    else s.rank = ""; 
                }
            });
        }

        // --- UI & RENDERING ---
        async function loadClassData() {
            currentState.year = document.getElementById('academic-year').value;
            currentState.term = document.getElementById('exam-term').value;
            currentState.cls = document.getElementById('class-select').value;
            
            if(!currentState.cls) return alert("Please select a class!");

            document.getElementById('teacher-login-section').classList.add('hidden');
            document.getElementById('teacher-dashboard').classList.remove('hidden');
            
            let termLabel = document.getElementById('exam-term').options[document.getElementById('exam-term').selectedIndex].text;
            document.getElementById('dashboard-title').innerText = `${currentState.cls.replace('-', ' ')} | ${termLabel}`;

            const docRef = window.doc(window.db, `results_${currentState.year}`, `${currentState.term}_${currentState.cls}`);
            const docSnap = await window.getDoc(docRef);
            
            if (docSnap.exists()) {
                currentState.students = docSnap.data().students || [];
            } else {
                currentState.students = [{ roll: 1, name: "", marks: {}, grades: {} }]; 
            }
            renderTable();
        }

        function renderTable() {
            calculateGradesAndRanks();
            
            let headHTML = `<tr><th class="px-4 py-3">Roll</th><th class="px-4 py-3 w-48">Student Name</th>`;
            sysConfig.numericSubjects.forEach(sub => headHTML += `<th class="px-4 py-3 bg-blue-800">${sub}</th>`);
            sysConfig.gradingSubjects.forEach(sub => headHTML += `<th class="px-4 py-3 bg-purple-800">${sub}</th>`);
            headHTML += `<th class="px-4 py-3 text-yellow-300 border-l-2 border-gray-400">Total</th><th class="px-4 py-3 text-yellow-300"># %age</th><th class="px-4 py-3 text-yellow-300">Grade</th><th class="px-4 py-3 text-yellow-300">Rank</th></tr>`;
            document.getElementById('table-head').innerHTML = headHTML;

            let bodyHTML = "";
            currentState.students.forEach((s, index) => {
                bodyHTML += `<tr class="border-b hover:bg-gray-50">
                    <td class="px-4 py-2 font-bold text-center">${s.roll || index + 1}</td>
                    <td class="px-4 py-2"><input type="text" value="${s.name || ''}" onchange="updateData(${index}, 'name', this.value)" class="border p-1 w-full rounded focus:ring-2 focus:ring-blue-400 outline-none"></td>`;
                
                sysConfig.numericSubjects.forEach(sub => {
                    let val = s.marks[sub] || '';
                    bodyHTML += `<td class="px-4 py-2"><input type="number" value="${val}" onchange="updateData(${index}, 'marks', this.value, '${sub}')" class="border p-1 w-16 rounded text-center focus:ring-2 focus:ring-blue-400 outline-none"></td>`;
                });

                sysConfig.gradingSubjects.forEach(sub => {
                    let val = s.grades[sub] || '';
                    bodyHTML += `<td class="px-4 py-2"><input type="text" maxlength="2" value="${val}" onchange="updateData(${index}, 'grades', this.value.toUpperCase(), '${sub}')" class="border p-1 w-12 rounded text-center uppercase focus:ring-2 focus:ring-purple-400 outline-none"></td>`;
                });

                bodyHTML += `<td class="px-4 py-2 font-bold bg-green-50 text-center border-l-2 border-gray-300">${s.total || ''}</td>
                             <td class="px-4 py-2 font-bold bg-green-50 text-center">${s.percentage || ''}</td>
                             <td class="px-4 py-2 font-bold bg-green-50 text-blue-600 text-center">${s.grade || ''}</td>
                             <td class="px-4 py-2 font-bold bg-green-50 text-red-600 text-center">${s.rank || ''}</td></tr>`;
            });
            document.getElementById('table-body').innerHTML = bodyHTML;
        }

        // --- DATA MANAGEMENT & EXPORT (Unchanged logic) ---
        function updateData(index, field, value, subField = null) {
            document.getElementById('save-status').innerText = "⚠️ Unsaved Changes";
            document.getElementById('save-status').classList.replace('text-gray-500', 'text-red-500');
            if (subField) {
                if (!currentState.students[index][field]) currentState.students[index][field] = {};
                currentState.students[index][field][subField] = value;
            } else { currentState.students[index][field] = value; }
            renderTable(); 
        }

        function addStudentRow() {
            currentState.students.push({ roll: currentState.students.length + 1, name: "", marks: {}, grades: {} });
            renderTable();
        }

        async function saveToFirebase() {
            const status = document.getElementById('save-status');
            status.innerText = "Saving...";
            try {
                const docRef = window.doc(window.db, `results_${currentState.year}`, `${currentState.term}_${currentState.cls}`);
                await window.setDoc(docRef, { students: currentState.students, lastUpdated: new Date().toISOString() });
                status.innerText = "✅ Saved to Cloud";
                status.classList.replace('text-red-500', 'text-green-600');
                setTimeout(() => status.classList.replace('text-green-600', 'text-gray-500'), 3000);
            } catch (error) { alert("Error saving: " + error.message); status.innerText = "❌ Save Failed"; }
        }

        async function exportToExcel() {
            const workbook = new ExcelJS.Workbook();
            const sheet = workbook.addWorksheet(currentState.cls);
            let termLabel = document.getElementById('exam-term').options[document.getElementById('exam-term').selectedIndex].text;
            let fullColumns = ["Roll No.", "Student Name", ...sysConfig.numericSubjects, ...sysConfig.gradingSubjects, "Total", "%age", "Grade", "Position"];

            sheet.mergeCells(1, 1, 1, fullColumns.length);
            let title1 = sheet.getCell('A1');
            title1.value = 'NWW RAVENWOOD INTERNATIONAL SCHOOL';
            title1.font = { size: 16, bold: true, color: { argb: 'FFFFFFFF' } };
            title1.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF0F172A' } }; 
            title1.alignment = { horizontal: 'center', vertical: 'middle' };

            sheet.mergeCells(2, 1, 2, fullColumns.length);
            let title2 = sheet.getCell('A2');
            title2.value = `${termLabel} Cumulative Result of ${currentState.cls.replace('-', ' ')} for Academic Session ${currentState.year}`;
            title2.font = { size: 12, bold: true, color: { argb: 'FFFFFFFF' } };
            title2.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1E3A8A' } }; 
            title2.alignment = { horizontal: 'center', vertical: 'middle' };

            let headerRow = sheet.addRow(fullColumns);
            headerRow.eachCell((cell) => {
                cell.font = { bold: true };
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFDBEAFE' } }; 
                cell.alignment = { horizontal: 'center' };
                cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
            });

            sheet.getColumn(1).width = 10; sheet.getColumn(2).width = 25; 
            for(let i = 3; i <= fullColumns.length; i++) sheet.getColumn(i).width = 12;

            currentState.students.forEach((s, index) => {
                let rowData = [
                    s.roll || index + 1, s.name || "",
                    ...sysConfig.numericSubjects.map(sub => s.marks[sub] || ""),
                    ...sysConfig.gradingSubjects.map(sub => s.grades[sub] || ""),
                    s.total || "", s.percentage || "", s.grade || "", s.rank || ""
                ];
                let row = sheet.addRow(rowData);
                row.eachCell((cell) => {
                    cell.alignment = { horizontal: 'center' };
                    cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                });
            });

            sheet.views = [{ state: 'frozen', ySplit: 3 }];
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Result_${currentState.cls}_${currentState.term}_${currentState.year}.xlsx`;
            link.click();
        }
    </script>
</body>
</html>
